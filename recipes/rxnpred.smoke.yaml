# Model arguments
model_revision: main
torch_dtype: float16
attn_implementation: sdpa
bf16: false
fp16: true
tf32: false

# Chemical Task arguments
chem_task: rxnpred
dataset_id_or_path: ${MIST_REPO_ROOT}/demo/rxnpred_tiny
rewards:
- format
- accuracy
special_smiles_tags: true

# Lora Arguments
# No LoRA is used here

# Training arguments
max_steps: 2
per_device_train_batch_size: 1
gradient_accumulation_steps: 1
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
learning_rate: 1.0e-6
lr_scheduler_type: constant
warmup_ratio: 0.0

# GRPO specific parameters
beta: 0.001
max_prompt_length: 256
max_completion_length: 256
num_generations: 2
use_vllm: false

# Logging arguments
logging_strategy: steps
logging_steps: 1
report_to: []

save_strategy: "steps"
save_steps: 1
seed: 42

# Hugging Face Hub
push_to_hub: false
