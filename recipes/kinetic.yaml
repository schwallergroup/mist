# Model arguments
model_revision: main
torch_dtype: bfloat16
attn_implementation: flash_attention_2
bf16: true
tf32: true

# Chemical Task arguments
chem_task: kinetic
dataset_id_or_path: /work/liac/kinetic
rewards:
- format
- accuracy

# Training arguments
max_steps: 
per_device_train_batch_size: 
gradient_accumulation_steps: 
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
learning_rate: 
lr_scheduler_type: cosine
warmup_ratio: 0.03

# GRPO specific parameters
beta: 0.001
max_prompt_length: 
max_completion_length: 
num_generations: 16
use_vllm: 
vllm_device: 
vllm_gpu_memory_utilization: 
vllm_max_model_len: 

# Logging arguments
logging_strategy: steps
logging_steps: 2
report_to:
- wandb

save_strategy: "steps"
save_steps: 25
seed: 42

# Hugging Face Hub 
push_to_hub: false 