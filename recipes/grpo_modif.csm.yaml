# Model arguments
model_revision: main
torch_dtype: bfloat16
attn_implementation: flash_attention_2
bf16: true
tf32: true

# Chemical Task arguments
chem_task: rxn_naming_v2
dataset_id_or_path: /data/david/reaction_class_prompts_600k.csv
rewards:
- format_continuous
- accuracy
- accuracy_percentage
- completion_difference
- completion_size
task_kwargs:
  answer_history_buffer_size: 16
  accuracy_give_penalty_to_invalid_answer: true
loss_type: bnpo
custom_kl_clipping: 10
custom_kl_clipping_mean: 0.01 
logging_kl: true
logging_kl_min: 0.0
custom_clipped_surrogate_objective: true
custom_clipped_surrogate_objective_epsilon_low: 0.3
custom_clipped_surrogate_objective_epsilon_high: 0.5

# Lora Arguments
# No LoRA is used here

# Training arguments
max_steps: 900
per_device_train_batch_size: 1
gradient_accumulation_steps: 4
gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false
learning_rate: 5.0e-6 # 1.0e-6 as in the deepseek math paper 5-e7 from https://hijkzzz.notion.site/unraveling-rlhf-and-its-variants-engineering-insights#147d9a33ecc9806090f3d5c749d31f05
lr_scheduler_type: cosine
warmup_ratio: 0.03
# GRPO specific parameters
beta: 0.04 # 0.04 as in the deepseek math paper 0.001 from https://hijkzzz.notion.site/unraveling-rlhf-and-its-variants-engineering-insights#147d9a33ecc9806090f3d5c749d31f05
max_prompt_length: 384
max_completion_length: 1024
num_generations: 2
use_vllm: true
vllm_device: "cuda:3"
vllm_gpu_memory_utilization: 0.8
vllm_max_model_len: 1024

# Logging arguments
logging_strategy: steps
logging_steps: 1
report_to:
- wandb

save_strategy: "steps"
save_steps: 1000
seed: 42

# Hugging Face Hub 
push_to_hub: false
  # hub_model_id: llama-3-1-8b-math-orca-qlora-10k-ep1 # if not defined same as output_dir